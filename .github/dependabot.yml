version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      root-python-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /backend
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
      - backend
    groups:
      backend-python-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
      - frontend
    groups:
      frontend-npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "eslint"
        versions: [">= 10.0.0"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch
