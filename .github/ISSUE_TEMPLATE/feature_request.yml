name: "\U0001f680 Feature Request"
description: "Suggest an idea for this project."
title: "[FEAT] "
labels: ["enhancement"]
assignees:
  - "param20h"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature! 
        Please provide as much context as possible so we can properly evaluate your idea.

  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      description: "A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or mockups about the feature request here."

  - type: checkboxes
    id: gssoc
    attributes:
      label: "GSSoC '26"
      description: "Are you a GSSoC contributor?"
      options:
        - label: "Yes, I am participating in GirlScript Summer of Code and would like to build this."
