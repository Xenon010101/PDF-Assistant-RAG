version: '3.8'

services:
  # Redis broker/result backend for Celery document processing
  redis:
    image: redis:7-alpine
    container_name: pdf_rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pdf_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf_rag}
      POSTGRES_USER: ${POSTGRES_USER:-pdf_rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdf_rag_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdf_rag_user} -d ${POSTGRES_DB:-pdf_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application ──────────────────────────────────────────
  app:
    build: .
    container_name: pdf_rag_app
    ports:
      - "7860:7860"
    volumes:
      - app_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me}
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pdf_rag_user}:${POSTGRES_PASSWORD:-pdf_rag_pass}@postgres:5432/${POSTGRES_DB:-pdf_rag}
      - UPLOAD_DIR=/app/data/uploads
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - GRAPH_PERSIST_DIR=/app/data/graphs
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Celery worker for document extraction, chunking, embeddings, and vector storage
  worker:
    build: .
    container_name: pdf_rag_worker
    command: >
      sh -c "cd /app/backend &&
      celery -A app.celery_app.celery_app worker --loglevel=info"
    volumes:
      - app_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me}
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pdf_rag_user}:${POSTGRES_PASSWORD:-pdf_rag_pass}@postgres:5432/${POSTGRES_DB:-pdf_rag}
      - UPLOAD_DIR=/app/data/uploads
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - GRAPH_PERSIST_DIR=/app/data/graphs
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── pgAdmin (optional — for local DB inspection) ─────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pdf_rag_pgadmin
    restart: unless-stopped
    profiles: ["debug"]   # only starts when: docker compose --profile debug up
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  app_data:
