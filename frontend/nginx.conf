server {
    listen       3000;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/html
        text/plain
        text/xml
        image/svg+xml;

    # ── Static asset caching ──────────────────────────────────────────────
    # Next.js hashes JS/CSS filenames — safe to cache aggressively
    location /_next/static/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── SPA fallback routing ──────────────────────────────────────────────
    # next export with output: "export" generates per-route .html files.
    # Try the exact file, then the directory index, then fall back to
    # index.html so client-side navigation works correctly.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
